<ion-header>
  <ion-toolbar class="bg-dark">
    <ion-buttons slot="start">
      <ion-button routerLink="/tabs/tab2">
        <ion-icon slot="icon-only" name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="text-light">Entrega</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content style="--ion-background-color: #000000; color: #ffffff;">
  <ion-text>
    <h1 class="bienvenida">Elije la forma de entrega</h1>
  </ion-text>

  <ion-card button style="--background: #333333;" routerLink="/metodo-pago">
    <ion-item lines="none" style="--background: #333333;">
      <ion-label>
        <h2 class="text-light">Enviar a domicilio</h2>
        <p class="text-light">Avenida Morelos SN - 7 A - Peñuela Residencial</p>
        <p class="text-light"><strong>Gratis</strong></p>
      </ion-label>
      <ion-icon name="chevron-forward-outline" class="icono-blanco"></ion-icon>
    </ion-item>
  </ion-card>

  <ion-text color="primary" routerLink="/servicio-domicilio">
    <p class="text-right">Editar o elegir otro domicilio</p>
  </ion-text>
</ion-content>
